<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>M2: The Mystery Safe</title>
  <link rel="stylesheet" href="../showcase/css/layouts.css">
  <link rel="stylesheet" href="../showcase/css/components.css">
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    /* Math Specific Styles */
    :root {
      --math-bg: #F3E8FF; /* Light purple */
      --math-primary: #7E22CE;
      --math-accent: #10B981;
    }
    
    body {
      background-color: var(--math-bg);
      font-family: 'Baloo 2', sans-serif;
      overflow: hidden; 
      margin: 0;
      padding: 0;
    }

    .math-game-container {
      max-width: 600px;
      margin: 0 auto;
      height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      background: white;
      box-shadow: var(--shadow-xl);
    }
    
    .math-header {
      background: var(--math-primary);
      padding: var(--space-md) var(--space-lg);
      color: white;
      border-radius: 0 0 var(--radius-xl) var(--radius-xl);
      text-align: center;
      margin-bottom: var(--space-md);
      box-shadow: var(--shadow-sm);
    }
    
    .math-header h1 {
      margin: 0;
      font-size: 24px;
      font-weight: 800;
    }
    
    .math-level-instructions {
      padding: 0 var(--space-lg);
      text-align: center;
      font-size: 20px;
      color: var(--text-secondary);
      margin-bottom: var(--space-lg);
    }
    
    /* M2_L1: Mystery Safe Logic Puzzle */
    .safe-container {
      background: #334155;
      padding: var(--space-xl);
      border-radius: var(--radius-lg);
      margin: 0 var(--space-lg);
      text-align: center;
      box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
      border: 8px solid #cbd5e1;
    }
    
    .safe-display {
      background: #020617;
      border: 4px solid #1e293b;
      padding: var(--space-md);
      border-radius: var(--radius-md);
      display: flex;
      justify-content: center;
      gap: var(--space-md);
      margin-bottom: var(--space-lg);
    }
    
    .digit-slot {
      width: 60px;
      height: 80px;
      background: #0f172a;
      border: 2px dashed #475569;
      color: #10B981; /* Matrix green */
      font-family: monospace;
      font-size: 48px;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: var(--radius-sm);
    }
    
    .digit-bank {
      display: flex;
      justify-content: center;
      gap: var(--space-md);
    }
    
    .digit-coin {
      width: 60px;
      height: 60px;
      background: #F59E0B;
      color: white;
      border-radius: 50%;
      font-size: 32px;
      font-weight: bold;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 4px 0 #D97706, inset 0 2px 0 rgba(255,255,255,0.3);
      cursor: grab;
    }

    .clues-panel {
      background: #FFFBEB;
      border: 2px solid #FDE68A;
      border-radius: var(--radius-md);
      padding: var(--space-md);
      margin: var(--space-lg);
    }

    .clues-panel h3 {
      margin: 0 0 var(--space-sm) 0;
      color: #B45309;
      font-size: 18px;
    }

    .clues-list {
      margin: 0;
      padding-left: var(--space-lg);
      color: #92400E;
      font-size: 16px;
      font-weight: 600;
    }

    .clues-list li {
      margin-bottom: var(--space-xs);
    }

  </style>
</head>
<body>

  <div class="math-game-container">
    <div class="math-header">
      <h1>M2: The Mystery Safe</h1>
    </div>
    
    <p class="math-level-instructions">Use the digits to crack the safe based on Mr. Edward's clues.</p>

    <div class="clues-panel">
      <h3>🕵️ Mr. Edward's Clues:</h3>
      <ul class="clues-list">
        <li>The number is even.</li>
        <li>The hundreds digit is more than 4.</li>
        <li>The tens digit is greater than the ones digit.</li>
      </ul>
    </div>

    <div class="safe-container">
      <div class="safe-display">
        <div class="digit-slot">_</div>
        <div class="digit-slot">_</div>
        <div class="digit-slot">_</div>
      </div>
      
      <div class="digit-bank">
        <div class="digit-coin">4</div>
        <div class="digit-coin">5</div>
        <div class="digit-coin">6</div>
      </div>
    </div>
    
  </div>

</body>
</html>
