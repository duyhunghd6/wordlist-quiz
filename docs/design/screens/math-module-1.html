<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>M1: The Weather Station</title>
  <link rel="stylesheet" href="../showcase/css/layouts.css">
  <link rel="stylesheet" href="../showcase/css/components.css">
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    /* Math Specific Styles */
    :root {
      --math-bg: #E0F2FE;
      --math-primary: #0284C7;
      --math-accent: #EAB308;
    }
    
    body {
      background-color: var(--math-bg);
      font-family: 'Baloo 2', sans-serif;
      overflow: hidden; /* App like */
      margin: 0;
      padding: 0;
    }

    .math-game-container {
      max-width: 600px;
      margin: 0 auto;
      height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      background: white;
      box-shadow: var(--shadow-xl);
    }
    
    .math-header {
      background: var(--math-primary);
      padding: var(--space-md) var(--space-lg);
      color: white;
      border-radius: 0 0 var(--radius-xl) var(--radius-xl);
      text-align: center;
      margin-bottom: var(--space-md);
      box-shadow: var(--shadow-sm);
    }
    
    .math-header h1 {
      margin: 0;
      font-size: 24px;
      font-weight: 800;
    }
    
    .math-level-instructions {
      padding: 0 var(--space-lg);
      text-align: center;
      font-size: 20px;
      color: var(--text-secondary);
      margin-bottom: var(--space-lg);
    }
    
    /* M1_L1: Sorting Number Line */
    .number-line-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: var(--space-lg);
      position: relative;
      margin: var(--space-xl) var(--space-md);
    }
    
    .number-line-bar {
      position: absolute;
      top: 50%;
      left: var(--space-xl);
      right: var(--space-xl);
      height: 8px;
      background: var(--text-secondary);
      z-index: 1;
      transform: translateY(-50%);
      border-radius: var(--radius-full);
    }
    
    .number-line-slots {
      display: flex;
      justify-content: space-between;
      width: 100%;
      z-index: 2;
      position: relative;
    }
    
    .slot {
      width: 48px;
      height: 48px;
      border: 3px dashed var(--text-secondary);
      border-radius: var(--radius-md);
      background: white;
    }
    
    .draggable-temp {
      padding: var(--space-sm) var(--space-md);
      background: var(--math-accent);
      color: white;
      font-weight: bold;
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-sm);
      margin: var(--space-sm);
      display: inline-block;
      cursor: grab;
      border: 2px solid rgba(0,0,0,0.1);
      border-bottom-width: 4px;
    }
    
    .temp-rack {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: var(--space-lg);
      background: rgba(2, 132, 199, 0.05); /* very light blue */
      border-radius: var(--radius-lg);
      margin: 0 var(--space-md);
    }
    
    /* M1_L2: Comparison Quickfire */
    .comparison-arena {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: var(--space-lg);
      margin: var(--space-xl) 0;
    }
    
    .number-card {
      font-size: 48px;
      font-weight: 900;
      color: var(--math-primary);
      background: white;
      padding: var(--space-lg);
      border-radius: var(--radius-lg);
      border: 4px solid var(--math-primary);
      box-shadow: var(--shadow-md);
      width: 100px;
      text-align: center;
    }
    
    .croc-buttons {
      display: flex;
      gap: var(--space-md);
      justify-content: center;
    }
    
    .croc-btn {
      font-size: 36px;
      padding: var(--space-md) var(--space-lg);
      background: var(--success);
      color: white;
      border: none;
      border-radius: var(--radius-md);
      border-bottom: 6px solid var(--success-hover);
      cursor: pointer;
      font-weight: bold;
      transition: transform 0.1s;
    }
    
    .croc-btn:active {
      transform: translateY(4px);
      border-bottom-width: 2px;
    }

  </style>
</head>
<body>

  <div class="math-game-container">
    <div class="math-header">
      <h1>M1: The Weather Station</h1>
    </div>
    
    <!-- LEVEL 1: Sorting -->
    <div style="display: block;">
      <p class="math-level-instructions">Level 1: Drag the temperatures onto the number line from coldest to warmest.</p>
      
      <div class="number-line-container">
        <div class="number-line-bar"></div>
        <div class="number-line-slots">
          <div class="slot"></div>
          <div class="slot"></div>
          <div class="slot"></div>
          <div class="slot"></div>
          <div class="slot"></div>
          <div class="slot"></div>
        </div>
      </div>
      
      <div class="temp-rack">
        <div class="draggable-temp" style="transform: rotate(-2deg);">Yakutsk (-32)</div>
        <div class="draggable-temp" style="transform: rotate(1deg);">Ulaanbaatar (-12)</div>
        <div class="draggable-temp" style="transform: rotate(-1deg);">Toronto (2)</div>
        <div class="draggable-temp" style="transform: rotate(3deg);">New York (9)</div>
        <div class="draggable-temp" style="transform: rotate(-2deg);">Bangkok (17)</div>
        <div class="draggable-temp" style="transform: rotate(1deg);">Jakarta (28)</div>
      </div>
    </div>

    <hr style="margin: 40px; border: 1px dashed #ccc;" />

    <!-- LEVEL 2: Comparison Quickfire -->
    <div style="display: block;">
      <p class="math-level-instructions">Level 2: Select the Hungry Crocodile (&lt; or &gt;) that eats the bigger number.</p>
      
      <div class="comparison-arena">
        <div class="number-card">-4</div>
        <div style="font-size: 48px; color: var(--text-secondary);">?</div>
        <div class="number-card">-6</div>
      </div>
      
      <div class="croc-buttons">
        <button class="croc-btn">&lt;</button>
        <button class="croc-btn">&gt;</button>
      </div>
    </div>
    
  </div>

</body>
</html>
