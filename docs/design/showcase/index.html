<!doctype html>
<html lang="en">
  <head>

        <ul class="nav-links">

          <li><button class="nav-btn active" data-target="sections/tokens.html"><i class="ph ph-palette"></i> Token Library</button></li>
          <li><button class="nav-btn" data-target="sections/icons.html"><i class="ph ph-smiley"></i> Iconography</button></li>

          <li class="nav-category">Components</li>

          <li class="nav-category">Systems</li>
          <li><button class="nav-btn" data-target="sections/state-matrix.html"><i class="ph ph-table"></i> State Matrix</button></li>
