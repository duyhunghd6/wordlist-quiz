<div class="section-header">
    <h2 class="section-title">Iconography</h2>
    <p class="section-description">Phosphor Icons configured for the Kids App aesthetic (Thick strokes, Filled variants).</p>
</div>

<div class="component-showcase">
    <div class="component-block">
        <h3>1. Game Entities (Filled)</h3>
        <p class="text-sm">High-impact, solid shapes for primary game elements.</p>
        <div class="flex-row" style="font-size: 32px; color: var(--color-text-primary); gap: 24px;">
            <i class="ph-fill ph-star" style="color: var(--color-warning);"></i>
            <i class="ph-fill ph-heart" style="color: var(--color-danger);"></i>
            <i class="ph-fill ph-lightning" style="color: var(--color-info);"></i>
            <i class="ph-fill ph-check-circle" style="color: var(--color-success);"></i>
            <i class="ph-fill ph-x-circle" style="color: var(--color-danger);"></i>
            <i class="ph-fill ph-coins" style="color: var(--color-warning);"></i>
            <i class="ph-fill ph-trophy" style="color: var(--color-warning);"></i>
            <i class="ph-fill ph-fire" style="color: #F97316;"></i>
        </div>
    </div>

    <div class="component-block">
        <h3>2. Navigation & Actions (Bold)</h3>
        <p class="text-sm">Thick-stroked line icons for UI controls.</p>
        <div class="flex-row" style="font-size: 28px; color: var(--color-text-primary); gap: 24px;">
            <i class="ph-bold ph-caret-left"></i>
            <i class="ph-bold ph-caret-right"></i>
            <i class="ph-bold ph-x"></i>
            <i class="ph-bold ph-list"></i>
            <i class="ph-bold ph-gear"></i>
            <i class="ph-bold ph-house"></i>
            <i class="ph-bold ph-speaker-high"></i>
            <i class="ph-bold ph-speaker-slash"></i>
        </div>
    </div>
</div>
